<body>
   <header>

    <div class="search-box">

        <button id="btnSecret" onclick="bukaKunciRahasia()">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </div>
</header>
    <nav id="menu-navigasi"></nav>
    <main>
        <div class="section-header">
            <h2>Latest videos</h2>
            <button class="filter-btn">▼</button>
        </div>
        <div class="video-grid" id="tempat-video"></div>
        <div class="pagination" id="tempat-pagination"></div>
    </main>
    <footer>
        <div class="footer-links"><a href="#">18 U.S.C 2257</a><a href="#">DMCA</a><a href="#">Privacy Policy</a><a href="#">Terms of Use</a></div>
        <p>© 2026 ZoneXhub. All rights reserved</p>
    </footer>
    <div class="fab-container" id="panelAdmin">
        <button class="fab-btn download" id="btnDownload" onclick="downloadWebFinal()">📥 Bikin File Siap Sebar</button>
        <button class="fab-btn save" id="btnSimpan" onclick="simpanPerubahan()">💾 Simpan Sementara</button>
        <button class="fab-btn" onclick="tambahVideo()">➕ Tambah Video</button>
        <button class="fab-btn" onclick="hapusVideo()">❌ Hapus Video</button>
        <button class="fab-btn" id="btnEdit" onclick="toggleEditMode()">⚙️ Mode Edit</button>
    </div>
    <script id="core-script">
        let jumlahKlik = 0;
        let waktuResetKlik;
        function bukaKunciRahasia() {
    jumlahKlik++;
    clearTimeout(waktuResetKlik);

    if (jumlahKlik >= 7) {

        let pass = prompt("Masukkan Password Admin");

        if (pass === "@Jid1234") {
            document.getElementById('panelAdmin').style.display = 'flex';
            alert("Login Berhasil!");
        } else {
            alert("Password Salah!");
        }

        jumlahKlik = 0;

    } else {

        waktuResetKlik = setTimeout(() => {
            jumlahKlik = 0;
        }, 1500);

    }
}

        let headerData = JSON.parse(localStorage.getItem('dataHeaderLokal')) || window.DATA_HEADER;
        let menuData = JSON.parse(localStorage.getItem('dataMenuObjLokal')) || window.DATA_MENU;
        let pagData = JSON.parse(localStorage.getItem('dataPagLokal')) || window.DATA_PAGINATION;
        let videoData = JSON.parse(localStorage.getItem('dataVideoLokal')) || window.DATA_VIDEO;

        const wadahLogo = document.getElementById("tempat-logo");
        const wadahVideo = document.getElementById("tempat-video");
        const wadahMenu = document.getElementById("menu-navigasi");
        const wadahPag = document.getElementById("tempat-pagination");
        let isEditMode = false;
const videoPerHalaman = 12;
let halamanSekarang = 1;
let hasilPencarian = null;

        function arahkanKeLink(video) {
    if (!isEditMode) {

        if (typeof gtag === 'function') {
            gtag('event', 'video_click', {
                video_title: video.judul
            });
        }

        const tujuan = video.tujuan || "#";

        window.location.href = tujuan;
    }
}


function bukaMenu(url) {
        window.open(url, "_blank");
        }
             function tampilkanHeader() {
    if (isEditMode) {
        wadahLogo.innerHTML = `<div class="edit-block" style="flex-direction: row; gap: 5px; align-items: center;">
            <input type="text" class="edit-sm-input" id="input-header-text" value="${headerData.text}" style="width: 150px; font-weight: bold; font-style: italic;">
            <input type="text" class="edit-sm-input edit-sm-link" id="input-header-link" value="${headerData.link}" placeholder="Link Redirect" style="width: 150px;">
        </div>`;
    } else {
        wadahLogo.innerHTML = `
            <a href="${headerData.link}">
    <img src="https://res.cloudinary.com/drtbkd5lr/image/upload/v1783158316/1000040907-removebg-preview_a8uua1.png"
         alt="Logo"
         style="height:auto; width:150px;">
</a>
        `;
    }
}


        function tampilkanMenu() {
            wadahMenu.innerHTML = `<a href="javascript:void(0)" class="active"
onclick="gantiHalaman(1)">HOME</a>`;
            menuData.forEach((menu, index) => {
                if (isEditMode) {
                    wadahMenu.innerHTML += `<div class="edit-block"><input type="text" class="edit-sm-input" id="input-menu-text-${index}" value="${menu.text}"><input type="text" class="edit-sm-input edit-sm-link" id="input-menu-link-${index}" value="${menu.link}" placeholder="Link"></div>`;
                } else {
                    wadahMenu.innerHTML += `<a href="javascript:void(0)" onclick="bukaMenu('${menu.link}')">${menu.text}</a>`;
                }
            });
        }

        
function tampilkanPagination() {
    if (isEditMode) { wadahPag.innerHTML=''; return; }
    wadahPag.innerHTML = '';
    const dataAktif = hasilPencarian || videoData;
    const totalHalaman = Math.max(1, Math.ceil(dataAktif.length / videoPerHalaman));

    if(halamanSekarang > 1){
        wadahPag.innerHTML += `<button onclick="gantiHalaman(${halamanSekarang-1})">Prev</button>`;
    }

    wadahPag.innerHTML += `<button class="${halamanSekarang===1?'active':''}" onclick="gantiHalaman(1)">1</button>`;

    let start = Math.max(2, halamanSekarang - 2);
    let end = Math.min(totalHalaman - 1, halamanSekarang + 2);

    if(start > 2){
        wadahPag.innerHTML += `<button disabled>...</button>`;
    }

    for(let i=start;i<=end;i++){
        wadahPag.innerHTML += `<button class="${i===halamanSekarang?'active':''}" onclick="gantiHalaman(${i})">${i}</button>`;
    }

    if(end < totalHalaman - 1){
        wadahPag.innerHTML += `<button disabled>...</button>`;
    }

    if(totalHalaman > 1){
        wadahPag.innerHTML += `<button class="${halamanSekarang===totalHalaman?'active':''}" onclick="gantiHalaman(${totalHalaman})">${totalHalaman}</button>`;
    }

    if(halamanSekarang < totalHalaman){
        wadahPag.innerHTML += `<button onclick="gantiHalaman(${halamanSekarang+1})">Next</button>`;
    }

    if(totalHalaman > 1){
        wadahPag.innerHTML += `<button onclick="gantiHalaman(${totalHalaman})">Last</button>`;
    }
}


        function tampilkanGrid() {
            wadahVideo.innerHTML = "";
            const mulai = (halamanSekarang-1)*videoPerHalaman;
            const akhir = mulai + videoPerHalaman;
            (hasilPencarian || videoData).slice(mulai, akhir).forEach((video, idx) => {
                const index = mulai + idx;
                const srcGambar = video.gambar ? video.gambar : "https://via.placeholder.com/640x360/000000/333333?text=Klik+Ganti+Gambar";
                wadahVideo.innerHTML += `
                    <div class="video-card ${isEditMode ? 'editing' : ''}" id="card-${index}" onclick="arahkanKeLink(videoData[${index}])">
                        <div class="thumbnail">
                            <img src="${srcGambar}" alt="Thumbnail" loading="lazy">
                            <div class="play-icon"></div>
                            <div class="overlay-stats">
                            <span><i class="fa-solid fa-eye"></i> ${video.views}</span>
                            <span><i class="fa-regular fa-clock"></i> ${video.durasi}</span>
                            </div>
                            <div class="edit-overlay" onclick="event.stopPropagation(); gantiGambarURL(${index})">🔗 Link Gambar</div>
                        </div>
                        <div class="info" onclick="if(isEditMode) event.stopPropagation();">
                            <div class="likes"></div>
                            <div class="title">${video.judul}</div>
                            <input type="text" class="edit-input-title" id="input-judul-${index}" value="${video.judul}">
                            <input type="text" class="edit-input-link" id="input-tujuan-${index}" value="${video.tujuan || video.link || ""}" placeholder="Link Tujuan">
                            <input type="text" class="edit-input-title" id="input-view-${index}" value="${video.views}" placeholder="Views">
                            <input type="text" class="edit-input-title" id="input-durasi-${index}" value="${video.durasi}" placeholder="Durasi">
                        </div>
                    </div>`;
            });
        }

        function toggleEditMode() {
            isEditMode = true;
            document.getElementById("btnEdit").style.display = "none";
            document.getElementById("btnSimpan").style.display = "block";
            document.getElementById("btnDownload").style.display = "block";
            tampilkanHeader(); tampilkanGrid(); tampilkanMenu(); tampilkanPagination();
        }

        function simpanPerubahan() {
    headerData.text = document.getElementById("input-header-text")?.value || headerData.text;
    headerData.link = document.getElementById("input-header-link")?.value || headerData.link;

    videoData.forEach((v, i) => {
        v.judul = document.getElementById(`input-judul-${i}`)?.value || v.judul;
        v.tujuan = document.getElementById(`input-tujuan-${i}`)?.value || v.tujuan;
