<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
}

.player{
    position:relative;
    width:100vw;
    height:100vh;
}

.player img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.play{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90px;
    height:90px;
    border-radius:50%;
    background:rgba(0,0,0,0.45);
    border:2px solid rgba(255,255,255,0.8);
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    text-decoration:none;
    transition:.25s;
}

.play:hover{
    transform:translate(-50%,-50%) scale(1.08);
    background:rgba(0,0,0,0.6);
}

.triangle{
    width:0;
    height:0;
    border-top:16px solid transparent;
    border-bottom:16px solid transparent;
    border-left:28px solid #fff;
    margin-left:6px;
}
</style>
</head>

<body>

<div class="player">
    <!-- Ganti dengan URL thumbnail kamu -->
    <img src="https://i.pinimg.com/736x/a1/b4/af/a1b4afd9d1db9e0a8464193dbc4719fa.jpg" alt="Thumbnail">

    <!-- Ganti dengan URL tujuan -->
    <a class="play" href="https://LINK-TUJUAN-KAMU.com">
        <span class="triangle"></span>
    </a>
</div>

</body>
</html>
