<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

.player{
    position:relative;
    width:100vw;
    height:100vh;
    background:#000;
}

/* Thumbnail */
.player a{
    display:block;
    width:100%;
    height:100%;
    position:relative;
}

.player img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

/* Play Button */
.play{
    position:absolute;
    top:43%; /* sebelumnya 50%, jadi lebih ke atas */
    left:50%;
    transform:translate(-50%,-50%);
    width:70px;   /* sebelumnya 95px */
    height:70px;  /* sebelumnya 95px */
    border-radius:50%;
    background:rgba(0,0,0,0.45);
    border:2px solid rgba(255,255,255,0.85);
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px);
    transition:.25s;
}

.play:hover{
    transform:translate(-50%,-50%) scale(1.1);
    background:rgba(0,0,0,0.6);
}

.triangle{
    width:0;
    height:0;
    border-top:14px solid transparent;
    border-bottom:14px solid transparent;
    border-left:24px solid #fff;
    margin-left:5px;
}

/* Bottom UI */
.progress{
    position:absolute;
    bottom:90px;
    left:15px;
    right:15px;
    display:flex;
    align-items:center;
    gap:10px;
    color:#fff;
    font-size:13px;
    z-index:5;
}

.bar{
    flex:1;
    height:4px;
    background:rgba(255,255,255,0.3);
    border-radius:10px;
    position:relative;
}

.dot{
    width:10px;
    height:10px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:0%;
    transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="player">

    <!-- GANTI LINK TUJUAN -->
    <a href="https://www.effectivecpmnetwork.com/t7pgs2uek7?key=b4d0a9ccbdeab1ce09b94e2b66968e28">

        <!-- GANTI THUMBNAIL -->
        <img src="https://i.pinimg.com/474x/5c/9f/53/5c9f53adf75235d42c125ec80d20eb0a.jpg" alt="Thumbnail">

        <div class="play">
            <span class="triangle"></span>
        </div>

    </a>

    <!-- Progress Bar UI -->
    <div class="progress">
        <span>00:00</span>

        <div class="bar">
            <div class="dot"></div>
        </div>

        <span>02:22</span>
    </div>

</div>

</body>
</html>
